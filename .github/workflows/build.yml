name: Build ToumaOS ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: toumaos

jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  build-iso:
    needs: build-container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Nos logueamos en Podman con el usuario normal de GitHub
      - name: Log in to Registry via Podman
        run: |
          podman login ${{ env.REGISTRY }} \
            -u ${{ github.actor }} \
            -p ${{ secrets.GITHUB_TOKEN }}

      - name: Create output directory
        run: mkdir -p ./output

      # SOLUCIÓN FINAL: Corremos podman SIN sudo, usando el driver vfs mapeado a su espacio seguro de usuario
      - name: Build ISO using bootc-image-builder
        run: |
          podman run --rm \
            --security-opt label=disable \
            -v "$(pwd)/output:/output" \
            -v "$HOME/.local/share/containers/storage:/var/lib/containers/storage" \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --storage-driver=vfs \
            build \
            --type iso \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            
      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToumaOS-ISO
          path: ./output/bootiso/install.iso
          if-no-files-found: error
