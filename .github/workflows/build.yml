name: Build ToumaOS ISO

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: toumaos

jobs:
  build-container:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  build-iso:
    needs: build-container
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Creamos las credenciales en una carpeta temporal para pasárselas al constructor
      - name: Setup auth for registry
        run: |
          mkdir -p ~/.config/containers
          echo '{"auths":{"${{ env.REGISTRY }}":{"auth":"$(echo -n "${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" | base64)"}}}' > ~/.config/containers/auth.json

      - name: Create output directory
        run: mkdir -p ./output

      # Ejecutamos el builder forzando el driver de almacenamiento compatible con la máquina virtual de GitHub
      - name: Build ISO using bootc-image-builder
        run: |
          sudo docker run --rm --privileged \
            -v "$(pwd)/output:/output" \
            -v ~/.config/containers/auth.json:/config/auth.json \
            quay.io/centos-bootc/bootc-image-builder:latest \
            --storage-driver=vfs \
            build \
            --type iso \
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest

      - name: Upload ISO Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ToumaOS-ISO
          path: ./output/bootiso/install.iso
          if-no-files-found: error
